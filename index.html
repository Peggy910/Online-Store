<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Fashion House</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fb;
}

header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

h2{
    margin-bottom:15px;
    color:#2563eb;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.product{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.product-info{
    padding:15px;
}

.price{
    color:green;
    font-weight:bold;
}

.hidden{
    display:none;
}

.order-item{
    padding:10px;
    border-bottom:1px solid #eee;
}
</style>
</head>
<body>

<header>
<h1>🛒 My Online Store</h1>
<p>Firebase Authentication + Firestore</p>
</header>

<div class="container">

<div class="card">
<h2>Store Products</h2>

<div class="products">

<div class="product">
<img src="https://www.1976.com.tw/prod/15839" alt="">
<div class="product-info">
<h3>CHANEL COCO EDP</h3>
<p class="price">$3900</p>
</div>
</div>

<div class="product">
<img src="https://critiques.she.com/product/info/les-beiges-healthy-glow-moisturizing-foundation/45333" alt="">
<div class="product-info">
<h3>LES BEIGES</h3>
<p class="price">$70</p>
</div>
</div>

<div class="product">
<img src="https://www.chanel.com/images/as///t_fashioncommercial_trim,f_auto,q_auto:good,dpr_1.1/w_3200/-80391495.jpg%203200w" alt="">
<div class="product-info">
<h3>Classic 11.12 Handbag</h3>
<p class="price">$6000</p>
</div>
</div>

</div>
</div>

<div class="card">
<h2>Sign Up</h2>

<input type="email" id="signupEmail" placeholder="Email">
<input type="password" id="signupPassword" placeholder="Password">
<button onclick="signup()">Create Account</button>
</div>

<div class="card">
<h2>Login</h2>

<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card">
<h2>User</h2>

<p id="userInfo">Not Logged In</p>

<button id="logoutBtn" class="hidden" onclick="logout()">
Logout
</button>
</div>

<div class="card">
<h2>Place Order</h2>

<input id="customerName" placeholder="Customer Name">

<select id="productName">
<option>Running Shoes</option>
<option>T-Shirt</option>
<option>Jacket</option>
</select>

<input id="quantity" type="number" min="1" value="1">

<input id="price" type="number" placeholder="Price">

<textarea id="message" placeholder="Message"></textarea>

<button onclick="placeOrder()">
Submit Order
</button>
</div>

<div class="card">
<h2>My Order History</h2>
<div id="orderHistory"></div>
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
getDocs,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "XXXXXXXX",
appId: "XXXXXXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async function(){

const email =
document.getElementById("signupEmail").value;

const password =
document.getElementById("signupPassword").value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("Account Created!");

}catch(error){
alert(error.message);
}
}

window.login = async function(){

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful");

}catch(error){
alert(error.message);
}
}

window.logout = async function(){

await signOut(auth);

alert("Logged Out");

}

async function loadOrders(user){

const container =
document.getElementById("orderHistory");

container.innerHTML = "";

const q = query(
collection(db,"orders"),
where("userId","==",user.uid)
);

const snapshot = await getDocs(q);

snapshot.forEach(doc=>{

const order = doc.data();

container.innerHTML += `
<div class="order-item">
<b>${order.productName}</b><br>
Customer: ${order.customerName}<br>
Quantity: ${order.quantity}<br>
Price: $${order.price}<br>
Message: ${order.message}<br>
Date: ${new Date(order.orderDate).toLocaleString()}
</div>
`;

});

}

window.placeOrder = async function(){

const user = auth.currentUser;

if(!user){
alert("Please login first.");
return;
}

const customerName =
document.getElementById("customerName").value;

const productName =
document.getElementById("productName").value;

const quantity =
document.getElementById("quantity").value;

const price =
document.getElementById("price").value;

const message =
document.getElementById("message").value;

try{

await addDoc(
collection(db,"orders"),
{
userId:user.uid,
userEmail:user.email,
customerName,
productName,
quantity:Number(quantity),
price:Number(price),
message,
orderDate:Date.now()
}
);

alert("Order Submitted!");

loadOrders(user);

}catch(error){
alert(error.message);
}
}

onAuthStateChanged(auth, async(user)=>{

const userInfo =
document.getElementById("userInfo");

const logoutBtn =
document.getElementById("logoutBtn");

if(user){

userInfo.innerHTML =
`
Logged in as:
<b>${user.email}</b>
`;

logoutBtn.classList.remove("hidden");

loadOrders(user);

}else{

userInfo.innerHTML =
"Not Logged In";

logoutBtn.classList.add("hidden");

document.getElementById(
"orderHistory"
).innerHTML = "";

}

});

</script>

</body>
</html>
